<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Automatic Redirect Meta Tag (3 seconds) -->
    <meta http-equiv="refresh" content="3;url=https://syntiox.pages.dev/">
    
    <!-- SEO and Canonical URL -->
    <link rel="canonical" href="https://syntiox.pages.dev/">
    <title>Syntiox - Redirecting...</title>
    <meta name="description" content="Syntiox has moved to a new and faster home. You are being redirected to our new domain.">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Syntiox has moved!">
    <meta property="og:description" content="We have upgraded our platform. Redirecting to our new home...">
    <meta property="og:url" content="https://syntiox.pages.dev/">
    <meta property="og:type" content="website">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --accent-blue: #0070f3;
            --text-light: #ffffff;
            --text-gray: #a1a1aa;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 112, 243, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 255, 255, 0.1), transparent 25%);
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            fill: var(--text-light);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px var(--accent-blue)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--accent-blue)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--accent-blue)); }
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        p {
            color: var(--text-gray);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .loader-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-blue);
            animation: load 3s linear forwards;
        }
        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .manual-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .manual-link:hover {
            color: #4095ff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Syntiox Logo SVG -->
        <svg class="logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        
        <h1>Syntiox has moved</h1>
        <p>We've upgraded to a faster platform. You are being redirected to our new home.</p>
        
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
        <a href="https://syntiox.pages.dev/" class="manual-link">Click here if you are not redirected automatically</a>
    </div>
    <script>
        // JavaScript Fallback Redirect after 3 seconds
        setTimeout(() => {
            window.location.replace("https://syntiox.pages.dev/");
        }, 3000);
    </script>
</body>
</html>
