
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntiox | Innovation Hub</title>
    <link rel="icon" href="https://sh4lu-z.vercel.app/assets/syntiox.png" type="image/png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="theme-toggle" id="themeBtn" aria-label="Toggle Dark Mode">
        <i class="fas fa-sun"></i>
    </button>

    <header>
        <div class="logo-container">
            <img src="https://sh4lu-z.vercel.app/assets/syntiox.png" alt="Syntiox Logo" class="brand-logo">
        </div>
        <h1>Syntiox</h1>
        <p class="tagline">Engineering High-Performance Systems & Advanced AI Research.</p>
    </header>

    <div class="container">
        <div class="grid" id="projectGrid">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i> Initializing Core Systems...
            </div>
        </div>
    </div>

    <footer>
        <div class="contact-box">
            <span class="contact-label">Connect with Syntiox</span>
            
            <div class="footer-buttons">
                <a href="https://github.com/Syntiox" target="_blank" class="github-btn">
                    <i class="fab fa-github"></i> Follow on GitHub
                </a>

                <a href="mailto:syntiox.official@gmail.com" class="email-btn">
                    <i class="fas fa-envelope"></i> syntiox.official@gmail.com
                </a>
            </div>

            <p class="copyright">
                &copy; 2026 Syntiox Organization. All Rights Reserved.
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
