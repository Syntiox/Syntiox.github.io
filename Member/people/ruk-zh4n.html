<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Session Tester</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body style="font-family: monospace; padding: 20px; background-color: #1a1a1a; color: #00ff00;">

    <h2>🚀 AURA SESSION TESTER (LOCAL)</h2>
    <hr>

    <div>
        <label>Enter Phone Number (with Country Code):</label><br>
        <input type="text" id="phone" placeholder="9477xxxxxxx" style="padding: 10px; font-size: 16px; width: 300px;">
        <br><br>
        <button onclick="startPairing()" style="padding: 10px 20px; font-size: 16px; cursor: pointer; background: green; color: white; border: none;">
            GET PAIRING CODE
        </button>
    </div>

    <hr>

    <h3>📡 STATUS LOGS:</h3>
    <div id="logs" style="border: 1px solid #555; padding: 10px; height: 150px; overflow-y: scroll; background: #000;">
        Waiting for connection...
    </div>

    <hr>

    <h3>🔢 PAIRING CODE:</h3>
    <div id="pairing-code" style="font-size: 40px; font-weight: bold; color: yellow; border: 2px dashed yellow; padding: 20px; text-align: center;">
        WAITING...
    </div>

    <hr>

    <h3>✅ SESSION ID:</h3>
    <div id="session-id" style="background: #222; padding: 15px; border: 1px solid lime; word-wrap: break-word; color: cyan;">
        Not Connected Yet
    </div>

    <script>
        // 1. Backend එකට Connect වෙනවා (Port 8000)
        const socket = io("http://localhost:8000");

        const logBox = document.getElementById("logs");
        const codeBox = document.getElementById("pairing-code");
        const sessionBox = document.getElementById("session-id");

        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML += `<div>[${time}] ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // Connection Status
        socket.on("connect", () => {
            addLog("🟢 Connected to Backend Server!");
        });

        socket.on("disconnect", () => {
            addLog("🔴 Disconnected from Server.");
        });

        // Error Handling
        socket.on("error", (data) => {
            addLog("❌ ERROR: " + data.message);
            alert("Error: " + data.message);
        });

        // 2. Pairing Code එක ආවම මෙතනට වැටෙනවා
        socket.on("pairing-code", (data) => {
            addLog("📩 Pairing Code Received!");
            codeBox.innerText = data.code;
            // Code එක ආපු ගමන් Copy කරගන්න ලේසි වෙන්න
            navigator.clipboard.writeText(data.code);
            alert("Code: " + data.code + " (Copied to Clipboard!)");
        });

        // 3. Session එක හරි ගියාම මෙතනට එනවා
        socket.on("session-success", (data) => {
            addLog("✅ SESSION SUCCESSFUL!");
            codeBox.innerText = "CONNECTED ✅";
            codeBox.style.color = "lime";
            codeBox.style.borderColor = "lime";
            
            sessionBox.innerText = data.id;
            addLog("🔑 Session ID: " + data.id);
        });

        // Button Click Function
        function startPairing() {
            const phoneNumber = document.getElementById("phone").value;
            
            if (!phoneNumber) {
                alert("Please enter a phone number!");
                return;
            }

            addLog("⏳ Requesting Code for " + phoneNumber + "...");
            codeBox.innerText = "LOADING...";
            
            // Backend එකට මැසේජ් එක යවනවා
            socket.emit('start-session', { 
                phoneNumber: phoneNumber,
                usePairingCode: true 
            });
        }
    </script>

</body>
</html>
