<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntiox Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="member.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Syntiox Community</h1>
            <p style="color: #64748b;">Automated Profile Discovery</p>
        </div>

        <div id="loader" class="loader"></div>
        <div id="member-list"></div>
    </div>

    <script>
        const OWNER = 'Syntiox';
        const REPO = 'Syntiox.github.io';
        const PATH = 'Member/people';

        async function loadMembers() {
            const memberList = document.getElementById('member-list');
            const loader = document.getElementById('loader');

            try {
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`);
                const files = await response.json();
                loader.style.display = 'none';

                files.forEach(file => {
                    if (file.name.endsWith('.html')) {
                        // ෆයිල් එකේ නම ගන්න (sh4lu-z.html -> sh4lu-z)
                        const username = file.name.replace('.html', '');
                        
                        const card = document.createElement('a');
                        card.href = `people/${file.name}`;
                        card.className = 'member-card';
                        
                        // GitHub එකෙන් කෙලින්ම Profile Photo එක ගන්නා URL එක
                        const photoUrl = `https://github.com/${username}.png`;

                        card.innerHTML = `
                            <div class="profile-wrapper">
                                <img src="${photoUrl}" 
                                     class="profile-img" 
                                     alt="${username}" 
                                     onerror="this.src='https://ui-avatars.com/api/?name=${username}&background=random&color=fff'">
                            </div>
                            <span>${username}</span>
                        `;
                        
                        memberList.appendChild(card);
                    }
                });
            } catch (error) {
                loader.innerHTML = "Error loading members.";
            }
        }

        loadMembers();
    </script>
</body>
</html>
