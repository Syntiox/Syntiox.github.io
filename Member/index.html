<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntiox Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="member.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Syntiox Community</h1>
            <p style="color: #64748b;">Automated Profile Discovery</p>
        </div>

        <div id="loader" class="loader"></div>
        <div id="member-list"></div>
    </div>

    <script>
        const OWNER = 'Syntiox';
        const REPO = 'Syntiox.github.io';
        const PATH = 'Member'; // දැන් PATH එක කෙලින්ම Member ෆෝල්ඩර් එක

        async function loadMembers() {
            const memberList = document.getElementById('member-list');
            const loader = document.getElementById('loader');

            try {
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`);
                const items = await response.json();
                loader.style.display = 'none';

                items.forEach(item => {
                    // මෙතනදී අපි බලන්නේ item එක type එක "dir" (folder) ද කියලා
                    if (item.type === 'dir') {
                        const username = item.name; // ෆෝල්ඩර් එකේ නම username එක විදිහට ගන්නවා
                        
                        const card = document.createElement('a');
                        // ලින්ක් එක යන්නේ අදාළ ෆෝල්ඩර් එක ඇතුළට (උදා: Member/username/)
                        card.href = `${username}/`; 
                        card.className = 'member-card';
                        
                        const photoUrl = `https://github.com/${username}.png`;

                        card.innerHTML = `
                            <div class="profile-wrapper">
                                <img src="${photoUrl}" 
                                     class="profile-img" 
                                     alt="${username}" 
                                     onerror="this.src='https://ui-avatars.com/api/?name=${username}&background=random&color=fff'">
                            </div>
                            <span>${username}</span>
                        `;
                        
                        memberList.appendChild(card);
                    }
                });
            } catch (error) {
                loader.innerHTML = "Error loading members.";
                console.error(error);
            }
        }

        loadMembers();
    </script>
</body>
</html>
